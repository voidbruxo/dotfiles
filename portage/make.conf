# These settings were set by the catalyst build script that automatically
# built this stage.
# Please consult /usr/share/portage/config/make.conf.example for a more
# detailed example.
# NOTE: This stage was built with the bindist Use flag enabled

COMMON_FLAGS="-march=skylake -mabm --param=l1-cache-line-size=64 --param=l1-cache-size=32 --param=l2-cache-size=8192 -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"
RUSTFLAGS="-C target-cpu=skylake"

#PORTAGE OPTIONS

PORTAGE_NICENESS=1
MAKEOPTS="-j9 -l8"
FEATURES="candy parallel-install parallel-fetch preserve-libs buildpkg getbinpkg"
VIDEO_CARDS="intel nvidia"
INPUT_DEVICES="libinput joystick synaptics"
EMERGE_DEFAULT_OPTS=""

#GENTOO MIRRORS

GENTOO_MIRRORS="https://mirror.eu.oneandone.net/linux/distributions/gentoo/gentoo/ https://ftp-stud.hs-esslingen.de/pub/Mirrors/gentoo/ https://ftp.halifax.rwth-aachen.de/gentoo/ https://ftp.uni-hannover.de/gentoo/ https://mirror.netzwerge.de/gentoo/"

#USE FLAGS

USE="-cdda -cdr -cd -dvd -dvdr -vcd \
     ffmpeg grub hardened X wayland pipewire savedconfig dist-kernel dbus policykit \
     polkit networkmanager systemd udev vulkan jpg png"

#ACCEPTS

ACCEPT_LICENSE="*"
ACCEPT_KEYWORDS="~amd64"

# Python Version
#PYTHON_TARGETS="python3_11 python3_12"

#GRUB BOOTLOADER
GRUB_PLATFORMS="efi-64"

# This sets the language of build output to English.

LC_MESSAGES=C.utf8
